<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Create a mixed nested structure: an unordered list where one item contains an ordered list, and another contains a description list. -->

    <ul>
      <li>
        <ol>
          <li>item 1</li>
          <li>item 2</li>
          <li>item 3</li>
        </ol>
      </li>
      <li>
        <dl>
          <dt>HTML</dt>
          <dd>Hyper Text Markup Language</dd>

          <dt>CSS</dt>
          <dd>Cascading Style Sheet</dd>

          <dt>JS</dt>
          <dd>JavaScript</dd>
        </dl>
      </li>
    </ul>
  </body>
</html>
