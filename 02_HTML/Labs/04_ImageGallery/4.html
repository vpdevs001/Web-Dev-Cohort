<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Create a semantic figure with an image and caption. Use <figure> to wrap an image and <figcaption> to add a descriptive caption. -->
    
    <figure>
        <img src="logo.png" alt="Logo" width="300">
        <figcaption>Logo of chaicode</figcaption>
    </figure>
</body>
</html>
