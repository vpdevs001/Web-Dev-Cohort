<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Create a responsive image using the <picture> element with multiple <source> tags for different screen sizes, and a fallback <img> tag. -->
     
    <picture>
        <source srcset="small-logo.png" media="(min-width: 640px)">
        <source srcset="medium-logo.png" media="(min-width: 1024px)">
        <img src="large-logo.png" alt="">
    </picture>
</body>
</html>
