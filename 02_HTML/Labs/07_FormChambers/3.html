<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Webpage</title>
  </head>
  <body>
    <!-- Create a form with a textarea for multi-line input. Add rows and cols attributes to control its size. -->

    <fieldset>
      <legend>Form</legend>
      <form>
        <label for="feedback-input">feedback:</label>
        <textarea
          rows="2"
          cols="10"
          name="feedback-input"
          id="feedback-input"
        ></textarea>
        <button type="submit">Submit!</button>
      </form>
    </fieldset>
  </body>
</html>
