<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Create a basic form with a text input field and a submit button. Learn the fundamental structure of forms. -->

    <fieldset>
      <legend>Form</legend>
      <form>
        <div>
          <label for="username-input">Username:</label>
          <input id="username-input" type="text" />
        </div>
        <button type="submit">Submit!</button>
      </form>
    </fieldset>
  </body>
</html>
