<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Create a table using rowspan to make cells span multiple rows. Show grouped or categorized data. -->

    <table>
        <tr>
          <th>Course</th>
          <th>Price</th>
          <th>Instructor</th>
        </tr>
        <tr>
          <td>NodeJS</td>
          <td rowspan="3">399</td>
          <td>Hitesh, Piyush</td>
        </tr>
        <tr>
          <td>React</td>
          <td rowspan="3">399</td>
          <td>Hitesh, Suraj</td>
        </tr>
        <tr>
          <td>Web Dev</td>
          <td>399</td>
          <td>Hitesh</td>
        </tr>
    </table>
  </body>
</html>
