<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Create a table with <colgroup> and <col> elements to group and style columns. Use <col> to define column properties. -->

    <table>
      <colgroup>
        <col span="2" style="background-color: aqua" />
        <col span="1" style="background-color: yellow" />
      </colgroup>
        <tr>
          <th>Course</th>
          <th>Price</th>
          <th>Instructor</th>
        </tr>
        <tr>
          <td>NodeJS</td>
          <td>399</td>
          <td>Hitesh, Piyush</td>
        </tr>
        <tr>
          <td>React</td>
          <td>399</td>
          <td>Hitesh, Suraj</td>
        </tr>
        <tr>
          <td>Web Dev</td>
          <td>399</td>
          <td>Hitesh</td>
        </tr>
    </table>
  </body>
</html>
