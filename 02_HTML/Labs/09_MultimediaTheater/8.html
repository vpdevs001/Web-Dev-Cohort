<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Create a comprehensive multimedia page with: (1) Video with captions, (2) Audio player, (3) Embedded iframe, (4) SVG graphic, (5) Canvas element. Show multimedia mastery! -->
    
    <video width="320" height="240" controls>
      <source src="movie.mp4" type="video/mp4" />
      <source src="movie.ogg" type="video/ogg" />
      <track
        src="fgsubtitles_en.vtt"
        kind="subtitles"
        srclang="en"
        label="English"
      />
      <track
        src="fgsubtitles_no.vtt"
        kind="subtitles"
        srclang="no"
        label="Norwegian"
      />
      Your browser does not support the video tag.
    </video>

    <audio controls>
      <source src="audio-file.ogg" type="audio/ogg" />
      <source src="audio-file.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>

    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="YouTube video player"
      frameborder="0"
      allowfullscreen
    ></iframe>

    <svg>
      <circle cx="25" cy="25" r="50" fill="red">
    </svg>
    <svg>
      <rect x="75" cy="75" width="100" height="200" fill="red">
    </svg>
    <svg>
      <rect x="75" cy="75" width="100" height="100" fill="red">
    </svg>

    <canvas width="500" height="500"></canvas>
</body>
</html>
