<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Million Checkboxes</title>
    <style>
      :root {
        --primary-bg: #1a0b2e;
        --secondary-bg: #2d1b3d;
        --tertiary-bg: #4a2c5a;
        --accent-color: #ff8c42;
        --accent-dark: #e67e22;
        --accent-glow: #ffb366;
        --text-color: #f8f4f0;
        --glass-bg: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 215, 0, 0.2);
        --checkbox-bg: linear-gradient(145deg, #3d2b4a, #2a1f35);
        --checkbox-checked: linear-gradient(145deg, #ff8c42, #e67e22);
        --shadow-color: rgba(255, 140, 66, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background:
          radial-gradient(
            ellipse at top,
            var(--primary-bg) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at bottom,
            var(--tertiary-bg) 0%,
            transparent 50%
          ),
          linear-gradient(
            135deg,
            var(--primary-bg) 0%,
            var(--secondary-bg) 100%
          );
        color: var(--text-color);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 25% 25%,
            rgba(255, 140, 66, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 75% 75%,
            rgba(255, 215, 102, 0.08) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      h1 {
        font-size: 4.5rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 3.5rem;
        background: linear-gradient(45deg, #ff8c42, #ffb366, #ff6b35, #f7931e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 3px;
        text-shadow: 0 0 30px rgba(255, 140, 66, 0.4);
        position: relative;
        z-index: 2;
      }

      #container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(55px, 1fr));
        gap: 18px;
        max-width: 1100px;
        width: 100%;
        padding: 3.5rem;
        background: var(--glass-bg);
        border-radius: 35px;
        backdrop-filter: blur(25px);
        border: 2px solid var(--glass-border);
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.5),
          0 0 80px rgba(255, 140, 66, 0.1),
          inset 0 2px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        z-index: 2;
      }

      input[type="checkbox"] {
        appearance: none;
        width: 55px;
        height: 55px;
        background: var(--checkbox-bg);
        border: 3px solid #5a4a6a;
        border-radius: 18px;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        box-shadow:
          0 6px 18px rgba(0, 0, 0, 0.6),
          inset 0 2px 0 rgba(255, 255, 255, 0.1),
          inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      }

      input[type="checkbox"]:hover {
        transform: scale(1.08);
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.7),
          0 0 30px var(--shadow-color),
          inset 0 2px 0 rgba(255, 255, 255, 0.15),
          inset 0 -2px 0 rgba(0, 0, 0, 0.3);
        border-color: #7a6a8a;
      }

      input[type="checkbox"]:checked {
        background: var(--checkbox-checked);
        border-color: var(--accent-color);
        box-shadow:
          0 6px 18px rgba(0, 0, 0, 0.6),
          0 0 40px var(--shadow-color),
          inset 0 2px 0 rgba(255, 255, 255, 0.2);
      }

      input[type="checkbox"]:checked::after {
        content: "✓";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #2a1f35;
        font-size: 32px;
        font-weight: 900;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 3.5rem;
          margin-bottom: 2.5rem;
          letter-spacing: 2px;
        }
        #container {
          padding: 2.5rem;
          gap: 15px;
          max-width: 95vw;
          border-radius: 28px;
        }
        input[type="checkbox"] {
          width: 50px;
          height: 50px;
        }
      }

      #error-alert {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #d32f2f, #b71c1c);
        color: #ffffff;
        padding: 18px 28px;
        border-radius: 12px;
        box-shadow:
          0 8px 24px rgba(211, 47, 47, 0.4),
          0 0 40px rgba(211, 47, 47, 0.2);
        font-size: 15px;
        font-weight: 700;
        display: none;
        z-index: 9999;
        border: 2px solid #ff5252;
        animation: slideIn 0.3s ease-out;
        max-width: 300px;
      }

      #error-alert.show {
        display: block;
      }

      #error-alert .error-message {
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      #error-alert .countdown {
        font-size: 13px;
        font-weight: 600;
        color: #ffcdd2;
        opacity: 0.9;
      }

      #container.rate-limited input[type="checkbox"] {
        pointer-events: none;
        opacity: 0.6;
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 2.8rem;
          letter-spacing: 1px;
        }
        #container {
          padding: 2rem;
          gap: 12px;
          border-radius: 24px;
        }
        input[type="checkbox"] {
          width: 45px;
          height: 45px;
        }
        #error-alert {
          top: 10px;
          right: 10px;
          left: 10px;
          max-width: calc(100vw - 20px);
        }
      }
    </style>
  </head>
  <body>
    <div id="error-alert"></div>
    <h1>1 Million CheckBoxes</h1>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");
      let isRateLimited = false;

      socket.on("server:error", (data) => {
        const errorMessage = data.error;
        handleServerError(errorMessage);
      });

      function handleServerError(message) {
        const errorAlert = document.getElementById("error-alert");

        // Check if it's a rate limiting error
        if (message.toLowerCase().includes("wait")) {
          showRateLimitError(errorAlert);
        } else {
          // Show other errors normally
          showGeneralError(errorAlert, message);
        }
      }

      function showRateLimitError(errorAlert) {
        if (isRateLimited) return; // Prevent multiple calls

        isRateLimited = true;
        container.classList.add("rate-limited");

        const COOLDOWN = 3;
        let timeRemaining = COOLDOWN;

        errorAlert.innerHTML = `
          <div class="error-message">⏱️ Rate Limited</div>
          <div class="countdown">Please wait ${timeRemaining}s before next action</div>
        `;
        errorAlert.classList.add("show");

        const countdownInterval = setInterval(() => {
          timeRemaining--;
          if (timeRemaining > 0) {
            errorAlert.querySelector(".countdown").textContent =
              `Please wait ${timeRemaining}s before next action`;
          } else {
            clearInterval(countdownInterval);
            isRateLimited = false;
            container.classList.remove("rate-limited");
            errorAlert.classList.remove("show");
          }
        }, 1000);
      }

      function showGeneralError(errorAlert, message) {
        errorAlert.innerHTML = `
          <div class="error-message">⚠️ Error</div>
          <div class="countdown">${message}</div>
        `;
        errorAlert.classList.add("show");

        setTimeout(() => {
          errorAlert.classList.remove("show");
        }, 4000);
      }

      socket.on("server:checkbox:change", (data) => {
        const { index, checked } = data;
        const input = document.getElementById(`checkbox-${index}`);
        if (input) {
          input.checked = checked;
        }
      });

      async function fetchStateFromServer() {
        while (container.firstChild) {
          container.removeChild(container.firstChild);
        }

        const response = await fetch("/checkboxes", { method: "GET" });
        const data = await response.json();

        if (data && data.checkboxes) {
          data.checkboxes.forEach((serverValue, index) => {
            const input = document.createElement("input");

            input.type = "checkbox";
            input.id = `checkbox-${index}`;
            input.checked = serverValue;

            input.addEventListener("change", (e) => {
              const checked = e.target.checked;
              console.log(checked, index);
              socket.emit("client:checkbox:change", { index, checked });
            });

            container.appendChild(input);
          });
        }
      }

      window.addEventListener("load", fetchStateFromServer);
    </script>
  </body>
</html>
