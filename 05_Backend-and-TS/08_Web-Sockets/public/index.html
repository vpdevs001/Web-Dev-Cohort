<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>10k Checkmarks</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #0f172a;
        color: #e5e7eb;
      }

      h1 {
        margin-bottom: 10px;
        color: #f1f5f9;
      }

      #list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 8px;
        max-height: 80vh;
        overflow-y: auto;
        padding: 10px;
        background: #1e293b;
        border-radius: 8px;
        border: 1px solid #334155;
      }

      .item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .item:hover {
        background: #334155;
      }

      input[type="checkbox"] {
        cursor: pointer;
        transform: scale(1.2);
        accent-color: #22c55e; /* modern browsers */
      }

      .label {
        font-size: 12px;
        color: #cbd5f5;
      }

      /* Scrollbar (optional, better dark feel) */
      #list::-webkit-scrollbar {
        width: 8px;
      }

      #list::-webkit-scrollbar-track {
        background: #1e293b;
      }

      #list::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }

      #list::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
    </style>
  </head>
  <body>
    <h1>10,000 Checkmarks</h1>
    <div id="list"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const list = document.getElementById("list");

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < 10000; i++) {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <input type="checkbox" class="checkbox" data-id="${i}" />
          <span class="label">Item ${i}</span>
        `;

        fragment.appendChild(div);
      }

      list.appendChild(fragment);

      list.addEventListener("click", (e) => {
        if (e.target.classList.contains("checkbox")) {
          const id = Number(e.target.dataset.id);
          socket.emit("toggle_item", id);
        }
      });

      socket.on("item_toggled", ({ id, checked }) => {
        const el = document.querySelector(`[data-id='${id}']`);
        if (el) el.checked = checked;
      });
    </script>
  </body>
</html>
